            p{
                display: none;
                /* it will hide the element */ 
                /* visibility: hidden; */
                /* it will store the element in memory but not display it */

            }

        body>div{
            height: 400px;
            width: 400px;
            border: solid black 2px;

        }

        div div{

            width: 100px;
            border: solid red 2px;
            background-color: lightgrey;
        }
