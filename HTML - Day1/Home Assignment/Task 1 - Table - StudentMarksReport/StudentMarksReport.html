<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1">
        <caption>Student Marks Report</caption>
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Class</th>
                <th colspan="2">Marks</th>
            </tr>
        </thead>
        <tr>
            <td rowspan="5">John</td>
            <td rowspan="5">10</td>
            <th>Subject</th>
            <th>Score</th>
        </tr>
        <tr>
            <td>Math</td>
            <td>90</td>
        </tr>
        <tr>
            <td>Science</td>
            <td>85</td>
        </tr>
        <tr>
            <td>English</td>
            <td>88</td>
        </tr>
        <tr>
            <td><b>Total</b></td>
            <td><b>263</b></td>
        </tr>

        <tr>
            <td rowspan="5">Alice</td>
            <td rowspan="5">10</td>
            <th>Subject</th>
            <th>Score</th>
        </tr>
        <tr>
            <td>Math</td>
            <td>92</td>
        </tr>
        <tr>
            <td>Science</td>
            <td>89</td>
        </tr>
        <tr>
            <td>English</td>
            <td>91</td>
        </tr>
        <tr>
            <td><b>Total</b></td>
            <td><b>272</b></td>
        </tr>


    </table>
    
</body>
</html>
